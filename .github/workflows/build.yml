name: Build Resume

on:
  push:
    branches: [main]
    paths:
      - 'resume.typ'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Typst
        uses: typst-community/setup-typst@v3
        
      - name: Install Poppler (for PDF to PNG)
        run: sudo apt-get install -y poppler-utils
        
      - name: Build PDF
        run: typst compile resume.typ resume.pdf
        
      - name: Generate Preview PNG
        run: pdftoppm -png -r 150 -singlefile resume.pdf preview
        
      - name: Commit preview if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add preview.png
          git diff --staged --quiet || git commit -m "Update preview"
          git push
